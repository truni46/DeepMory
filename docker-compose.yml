version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - FRONTEND_URL=http://localhost:80
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=ai_tutor_db
      - DB_USER=ai_tutor
      - DB_PASSWORD=ai_tutor_pass
      - REDIS_HOST=redis
      - USE_DATABASE=true
      # LLM config (using ollama on host via host.docker.internal if needed, or default)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      # Qdrant
      - QDRANT_URL=http://qdrant:6333
      # Neo4j
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=ai_tutor_pass
      # LightRAG
      - LIGHTRAG_QUERY_MODE=hybrid
    depends_on:
      - db
      - redis
      - qdrant
      - neo4j
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      args:
        - VITE_API_URL=http://localhost:3000/api
        - VITE_SOCKET_URL=http://localhost:3000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=ai_tutor
      - POSTGRES_PASSWORD=ai_tutor_pass
      - POSTGRES_DB=ai_tutor_db
    ports:
      - "5432:5432"
    networks:
      - app_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_tutor -d ai_tutor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - app_network

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app_network
    restart: unless-stopped

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/ai_tutor_pass
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
